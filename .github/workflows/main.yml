name: Wentra - Final Derleme Sistemi

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    name: Wentra JAR Üretimi
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Depoyu Klonla
      uses: actions/checkout@v4

    - name: 2. JDK 8 ve JavaFX Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx

    - name: 3. Akıllı Derleme ve Paketleme
      run: |
        echo "--> Hazırlık yapılıyor..."
        mkdir -p out/classes out/staging
        
        # Tüm Java dosyalarını bul
        find . -name "*.java" > sources.txt
        
        # Dosyalar gerçekten var mı kontrol et
        if [ ! -s sources.txt ]; then
          echo "::error:: KRİTİK HATA: Java dosyaları bulunamadı!"
          exit 1
        fi

        # Kütüphaneleri bul ve derle
        echo "--> Derleme işlemi başlatılıyor..."
        LIBS=$(find . -name "*.jar" | tr '\n' ':')
        javac -cp "$LIBS" -d out/classes @sources.txt

        # Sınıfları ve kütüphaneleri JAR içinde birleştir
        echo "--> Paketleme yapılıyor..."
        cd out/staging
        find ../.. -name "*.jar" -exec jar xf {} \;
        rm -rf META-INF/*.RSA META-INF/*.SF META-INF/*.DSA META-INF/MANIFEST.MF
        cp -r ../classes/* .
        
        # Ban Koruması (Agent Manifest)
        printf "Manifest-Version: 1.0\nMain-Class: wentra.Main\nPremain-Class: wentra.Main\nAgent-Class: wentra.Main\nCan-Retransform-Classes: true\nCan-Redefine-Classes: true\n\n" > manifest.txt

        jar cvfm ../../WentraClient.jar manifest.txt .

    - name: 4. JAR Dosyasını İndir
      uses: actions/upload-artifact@v4
      with:
        name: WentraClient-Build
        path: WentraClient.jar
