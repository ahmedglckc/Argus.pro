name: Wentra Client - Tam Derleme (Manuel Javac)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-cpp-loader:
    name: C++ Injector Derlemesi
    runs-on: windows-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: MSBuild Kurulumu
      uses: microsoft/setup-msbuild@v2

    - name: C++ Projesini Derle (Release x64)
      working-directory: ${{ github.workspace }}\Jarload\rac
      run: msbuild wentra.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: C++ Çıktısını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Injector-Build
        path: ${{ github.workspace }}\Jarload\rac\x64\Release\*.exe

  build-java-client:
    name: Java Client (JAR) Derlemesi
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: JDK 8 Ortamını Hazırla (Minecraft 1.8 İçin)
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Manuel Javac Derlemesi (build.xml olmadan)
      run: |
        echo "Adım 1: Gerekli klasörler oluşturuluyor..."
        mkdir -p build/classes
        mkdir -p build/jar-staging
        
        echo "Adım 2: Tüm .java kaynak dosyaları bulunuyor..."
        find WentraReborn-CraftRise/src -name "*.java" > sources.txt
        
        echo "Bulunan dosya sayısı:"
        wc -l sources.txt
        
        echo "Adım 3: Kütüphaneler (Libraries) classpath'e eklenerek derleme yapılıyor..."
        # Windows, Mac ve Linux LWJGL kütüphanelerinizi dahil ederek derliyoruz.
        javac -cp "WentraReborn-CraftRise/libraries/*" -d build/classes @sources.txt
        
        echo "Adım 4: Kütüphaneler (Libraries) JAR dosyasının içine çıkartılıyor..."
        # Eğer kütüphaneler JAR'ın içinde olmazsa, oyuna inject ettiğinizde ClassNotFound hatası alırsınız.
        cd build/jar-staging
        for jar in ../../WentraReborn-CraftRise/libraries/*.jar; do
          jar xf "$jar"
        done
        
        # Gereksiz META-INF dosyalarını siliyoruz ki çakışma yapmasın
        rm -rf META-INF/MANIFEST.MF
        rm -rf META-INF/*.RSA
        rm -rf META-INF/*.SF
        rm -rf META-INF/*.DSA
        
        echo "Adım 5: Sizin derlenen kodlarınız kütüphanelerle birleştiriliyor..."
        cp -r ../classes/* .
        
        echo "Adım 6: Nihai WentraClient.jar oluşturuluyor..."
        jar cvf ../../WentraClient.jar .
        
        echo "İşlem tamamlandı!"

    - name: JAR Çıktısını İndirilebilir Hale Getir
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Client-JAR
        path: WentraClient.jar
