name: Wentra Client - Java Agent ve Otomatik Derleme

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-java-client:
    name: Java Agent (JAR) Derlemesi
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: JDK 8 ve JavaFX Ortamını Hazırla
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx
        
    - name: Profesyonel Ajan Derlemesi
      run: |
        echo "Adım 1: Klasörler hazırlanıyor..."
        mkdir -p build/classes
        mkdir -p build/jar-staging
        
        echo "Adım 2: Kaynak dosyalar taranıyor..."
        find WentraReborn-CraftRise/src -name "*.java" > sources.txt
        
        echo "Adım 3: Derleme (Javac) başlatılıyor..."
        javac -cp "WentraReborn-CraftRise/libraries/*" -d build/classes @sources.txt
        
        echo "Adım 4: Kütüphaneler JAR içine paketleniyor..."
        cd build/jar-staging
        for jar in ../../WentraReborn-CraftRise/libraries/*.jar; do
          jar xf "$jar"
        done
        
        # Gereksiz dosyaları temizle
        rm -rf META-INF/MANIFEST.MF META-INF/*.RSA META-INF/*.SF META-INF/*.DSA
        
        echo "Adım 5: Kodlar birleştiriliyor..."
        cp -r ../classes/* .
        
        echo "Adım 6: KRİTİK - Java Agent Manifesti oluşturuluyor..."
        # Bu kısım hilenin ban yememesini sağlayan kimliktir
        echo "Manifest-Version: 1.0" > manifest.txt
        echo "Main-Class: wentra.Main" >> manifest.txt
        echo "Premain-Class: wentra.Main" >> manifest.txt
        echo "Agent-Class: wentra.Main" >> manifest.txt
        echo "Can-Retransform-Classes: true" >> manifest.txt
        echo "Can-Redefine-Classes: true" >> manifest.txt
        echo "" >> manifest.txt # Boş satır zorunludur

        echo "Adım 7: Nihai WentraClient.jar oluşturuluyor..."
        jar cvfm ../../WentraClient.jar manifest.txt .
        
        echo "İşlem başarıyla tamamlandı efendim!"

    - name: JAR Dosyasını İndir
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Agent-JAR
        path: WentraClient.jar
