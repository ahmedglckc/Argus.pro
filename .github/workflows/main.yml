name: Wentra Client - Tam Derleme (JavaFX Destekli)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-cpp-loader:
    name: C++ Injector Derlemesi
    runs-on: windows-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: MSBuild Kurulumu
      uses: microsoft/setup-msbuild@v2

    - name: C++ Projesini Derle (Release x64)
      working-directory: ${{ github.workspace }}\Jarload\rac
      run: msbuild wentra.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: C++ Çıktısını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Injector-Build
        path: ${{ github.workspace }}\Jarload\rac\x64\Release\*.exe

  build-java-client:
    name: Java Client (JAR) Derlemesi
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    # DEĞİŞTİRİLEN KISIM: JavaFX desteği için Zulu dağıtımı kullanılıyor
    - name: JDK 8 ve JavaFX Ortamını Hazırla
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'zulu'
        java-package: jdk+fx
        
    - name: Manuel Javac Derlemesi
      run: |
        echo "Adım 1: Gerekli klasörler oluşturuluyor..."
        mkdir -p build/classes
        mkdir -p build/jar-staging
        
        echo "Adım 2: Tüm .java kaynak dosyaları bulunuyor..."
        find WentraReborn-CraftRise/src -name "*.java" > sources.txt
        
        echo "Bulunan dosya sayısı:"
        wc -l sources.txt
        
        echo "Adım 3: Kütüphaneler ve JavaFX ortamı ile derleme yapılıyor..."
        # JavaFX artık Zulu JDK'nın içinde olduğu için ekstra classpath'e gerek yok,
        # sadece sizin libraries klasörünüzdeki kütüphaneleri tanıtıyoruz.
        javac -cp "WentraReborn-CraftRise/libraries/*" -d build/classes @sources.txt
        
        echo "Adım 4: Kütüphaneler (Libraries) JAR dosyasının içine çıkartılıyor..."
        cd build/jar-staging
        for jar in ../../WentraReborn-CraftRise/libraries/*.jar; do
          jar xf "$jar"
        done
        
        # Gereksiz imza dosyalarını siliyoruz
        rm -rf META-INF/MANIFEST.MF
        rm -rf META-INF/*.RSA
        rm -rf META-INF/*.SF
        rm -rf META-INF/*.DSA
        
        echo "Adım 5: Derlenen kodlar kütüphanelerle birleştiriliyor..."
        cp -r ../classes/* .
        
        echo "Adım 6: Nihai WentraClient.jar oluşturuluyor..."
        jar cvf ../../WentraClient.jar .
        
        echo "İşlem başarıyla tamamlandı!"

    - name: JAR Çıktısını İndirilebilir Hale Getir
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Client-JAR
        path: WentraClient.jar
