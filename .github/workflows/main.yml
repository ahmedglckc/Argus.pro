name: Wentra Client - Tam Derleme (C++ ve Java)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel tetikleme butonu ekler

jobs:
  build-cpp-loader:
    name: C++ Loader (Injector) Derlemesi
    runs-on: windows-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: MSBuild Kurulumu
      uses: microsoft/setup-msbuild@v2

    - name: C++ Projesini Derle (Release x64)
      working-directory: ${{ github.workspace }}\Jarload\rac
      # wentra.vcxproj dosyanızın bulunduğu dizine göre yolu ayarlayın
      run: msbuild wentra.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: C++ Çıktısını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Injector-Build
        path: ${{ github.workspace }}\Jarload\rac\x64\Release\*.exe # veya *.dll

  build-java-client:
    name: Java Client (JAR) Derlemesi
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: JDK 8 Ortamını Hazırla
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Ant Kurulumu
      run: sudo apt-get install ant -y
        
    # IntelliJ Artifact dosyasını komut satırından derlemek için Ant kullanıyoruz.
    # Bunun çalışması için projenizin kök dizininde bir build.xml dosyası oluşturmanız gerekecektir.
    - name: Ant ile JAR Derle
      working-directory: ./WentraReborn-CraftRise
      run: ant -f build.xml

    - name: JAR Çıktısını Yükle
      uses: actions/upload-artifact@v4
      with:
        name: Wentra-Client-JAR
        path: ./WentraReborn-CraftRise/out/artifacts/**/*.jar
